<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bald verfügbar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --gold: #9B1C31;
      --gold-light: #c0253f;
      --text: #ede8e8;
      --muted: #6b5a5a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    /* Background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(155,28,49,0.18), transparent 70%);
      top: -200px; right: -100px;
      animation-duration: 14s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(155,28,49,0.12), transparent 70%);
      bottom: -100px; left: -100px;
      animation-duration: 18s;
      animation-direction: alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Main layout */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* Decorative line */
    .line-top {
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--gold));
      margin-bottom: 3rem;
      animation: fadeDown 1.2s ease forwards;
      opacity: 0;
    }

    /* Logo / Brand */
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      font-weight: 400;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
      animation: fadeUp 1s ease 0.3s forwards;
      opacity: 0;
    }

    /* Main headline */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1;
      text-align: center;
      color: var(--text);
      animation: fadeUp 1s ease 0.5s forwards;
      opacity: 0;
    }
    h1 span {
      color: var(--gold);
      font-style: italic;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin: 2.5rem 0;
      width: min(400px, 80vw);
      animation: fadeUp 1s ease 0.7s forwards;
      opacity: 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--muted), transparent);
    }
    .divider-icon {
      color: var(--gold);
      font-size: 0.6rem;
      letter-spacing: 0.3em;
    }

    /* Subtitle */
    p.subtitle {
      font-size: clamp(0.75rem, 1.5vw, 0.85rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      max-width: 400px;
      line-height: 2;
      animation: fadeUp 1s ease 0.9s forwards;
      opacity: 0;
    }

    /* Countdown */
    .countdown {
      display: flex;
      gap: clamp(1.5rem, 4vw, 3rem);
      margin-top: 4rem;
      animation: fadeUp 1s ease 1.1s forwards;
      opacity: 0;
    }
    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .countdown-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      color: var(--text);
      line-height: 1;
      min-width: 2ch;
      text-align: center;
    }
    .countdown-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .countdown-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      color: var(--gold);
      line-height: 1;
      padding-top: 0.1rem;
    }

    /* Bottom line */
    .line-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      animation: fadeIn 1.5s ease 1.5s forwards;
      opacity: 0;
    }

    /* Footer note */
    .footer-note {
      position: fixed;
      bottom: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      animation: fadeIn 1s ease 2s forwards;
      opacity: 0;
    }

    /* Keyframes */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: scaleY(0); transform-origin: top; }
      to   { opacity: 1; transform: scaleY(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <main class="page">
    <div class="line-top"></div>

    <div class="brand">NEXRAI</div>

    <h1>Die Ära autonomer<br><span>KI-Agenten beginnt.</span></h1>

    <div class="divider">
      <span class="divider-icon">✦ ✦ ✦</span>
    </div>

    <p class="subtitle">
      Wir bauen intelligente KI-Agenten-Lösungen für<br>
      Unternehmen, Privatpersonen und Influencer.<br>
      Die Plattform befindet sich aktuell in der finalen<br>
      Entwicklungsphase und steht kurz vor dem Launch.
    </p>
  </main>

  <div class="footer-note">© 2026 · NEXRAI</div>
  <div class="line-bottom"></div>

  <script></script>
</body>
</html>
